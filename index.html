<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Face Capture</title>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#080b14;color:#e2e8f6;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px;gap:14px}
  .cam-wrap{position:relative;width:100%;max-width:380px;aspect-ratio:4/3;background:#000;border-radius:14px;overflow:hidden;border:1px solid #ffffff18}
  video{width:100%;height:100%;object-fit:cover;display:block}
  .ring{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .ring div{width:55%;aspect-ratio:1;border-radius:50%;border:2px solid rgba(59,130,246,.6);animation:rp 2.5s infinite}
  @keyframes rp{0%,100%{border-color:rgba(59,130,246,.5)}50%{border-color:rgba(6,182,212,.8)}}
  .msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(8,11,20,.8);font-size:13px;color:#64748b;flex-direction:column;gap:8px}
  .btns{display:flex;gap:10px;width:100%;max-width:380px}
  button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
  .b1{background:#1a2236;color:#e2e8f6;border:1px solid #ffffff18}
  .b2{background:rgba(59,130,246,.12);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
  .b2:disabled{opacity:.35;cursor:not-allowed}
  #status{font-size:12px;color:#64748b;text-align:center;max-width:380px}
  .result{width:100%;max-width:380px;background:#111827;border:1px solid #ffffff18;border-radius:14px;padding:16px;display:none}
  .result.ok{border-color:rgba(16,185,129,.4)}
  .result.fail{border-color:rgba(239,68,68,.4)}
  .rname{font-size:17px;font-weight:700;margin-bottom:3px}
  .rsub{font-size:12px;color:#64748b;margin-bottom:14px}
  .rbtns{display:flex;gap:10px}
  .bin{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(16,185,129,.25);background:rgba(16,185,129,.12);color:#10b981;font-weight:700;cursor:pointer;font-size:14px}
  .bout{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(59,130,246,.25);background:rgba(59,130,246,.12);color:#3b82f6;font-weight:700;cursor:pointer;font-size:14px}
  .rfail{font-size:13px;color:#ef4444;text-align:center;padding:8px}
</style>
</head>
<body>
<div id="status">⏳ Loading face models...</div>
<div class="cam-wrap">
  <video id="vid" autoplay muted playsinline></video>
  <div class="ring"><div></div></div>
  <div class="msg" id="msg"><span>📷 Camera not started</span></div>
</div>
<div class="btns">
  <button class="b1" onclick="startCam()">📷 Start Camera</button>
  <button class="b2" id="btnV" onclick="doVerify()" disabled>⚡ Verify Face</button>
</div>
<div class="result" id="result">
  <div class="rname" id="rname">—</div>
  <div class="rsub" id="rsub">—</div>
  <div class="rbtns" id="rbtns"></div>
  <div class="rfail" id="rfail" style="display:none"></div>
</div>
<script>
var MODEL_URL='https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
var stream=null,employees=[],verified=null,capturedB64=null,ORIGIN='*';

window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='LOAD_EMPLOYEES'){
    employees=e.data.employees||[];
    ORIGIN=e.origin;
    document.getElementById('status').textContent='✅ '+employees.length+' employees loaded. Start camera.';
  }
});

Promise.all([
  faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
  faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
  faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
]).then(function(){
  document.getElementById('status').textContent='✅ Models ready. Waiting for data...';
  window.parent.postMessage({type:'MODELS_READY'},'*');
}).catch(function(e){
  document.getElementById('status').textContent='❌ Model error: '+e.message;
});

function startCam(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false})
  .then(function(s){
    stream=s;
    document.getElementById('vid').srcObject=s;
    document.getElementById('msg').style.display='none';
    document.getElementById('btnV').disabled=false;
    document.getElementById('status').textContent='✅ Camera ready. Click Verify Face.';
  }).catch(function(e){
    document.getElementById('status').textContent='❌ Camera error: '+e.message;
  });
}

function doVerify(){
  if(!stream){document.getElementById('status').textContent='Start camera first';return;}
  document.getElementById('status').textContent='🔍 Scanning...';
  var vid=document.getElementById('vid');
  faceapi.detectSingleFace(vid,new faceapi.SsdMobilenetv1Options({minConfidence:0.5}))
  .withFaceLandmarks().withFaceDescriptor()
  .then(function(det){
    if(!det){document.getElementById('status').textContent='⚠️ No face detected. Try again.';return;}
    var cvs=document.createElement('canvas');
    cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
    cvs.getContext('2d').drawImage(vid,0,0);
    capturedB64=cvs.toDataURL('image/jpeg',0.75);
    var best=null,bestD=Infinity;
    employees.forEach(function(emp){
      if(!emp.faceDescriptor)return;
      var arr=Array.isArray(emp.faceDescriptor)?emp.faceDescriptor:Object.values(emp.faceDescriptor);
      var d=faceapi.euclideanDistance(det.descriptor,new Float32Array(arr));
      if(d<bestD){bestD=d;best=emp;}
    });
    var res=document.getElementById('result');
    if(best&&bestD<0.55){
      verified=best;
      var score=Math.round((1-bestD)*100);
      document.getElementById('rname').textContent=best.fullName;
      document.getElementById('rsub').textContent=best.department+' · '+best.employeeId+' · Match: '+score+'%';
      document.getElementById('rbtns').innerHTML='<button class="bin" onclick="sendRecord(\'time_in\')">▶ TIME IN</button><button class="bout" onclick="sendRecord(\'time_out\')">◀ TIME OUT</button>';
      document.getElementById('rfail').style.display='none';
      res.className='result ok';res.style.display='block';
      document.getElementById('status').textContent='✅ Matched: '+best.fullName;
    } else {
      verified=null;
      document.getElementById('rname').textContent='Not Recognized';
      document.getElementById('rsub').textContent='';
      document.getElementById('rbtns').innerHTML='';
      document.getElementById('rfail').textContent='Face does not match any registered employee.';
      document.getElementById('rfail').style.display='block';
      res.className='result fail';res.style.display='block';
      document.getElementById('status').textContent='❌ Not recognized.';
    }
  }).catch(function(e){document.getElementById('status').textContent='❌ Error: '+e.message;});
}

function sendRecord(type){
  if(!verified)return;
  window.parent.postMessage({type:'ATTENDANCE_RECORD',recordType:type,employee:verified,photoB64:capturedB64},ORIGIN||'*');
  document.getElementById('status').textContent='📤 Sending...';
  document.getElementById('result').style.display='none';
}
</script>
</body>
</html>
