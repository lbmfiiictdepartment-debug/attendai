<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<title>AttendAI — Clock In/Out</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<style>
/* ══════════════════════════════════════
   SMART ATTENDANCE — STYLESHEET
   Dark tactical theme · Syne + DM Mono
══════════════════════════════════════ */
:root{
  --bg:    #080b14;
  --bg1:   #0d1120;
  --bg2:   #111827;
  --bg3:   #1a2236;
  --bg4:   #1f2a40;
  --border:#ffffff0f;
  --bord2: #ffffff18;
  --bord3: #ffffff28;

  --c-text:  #e2e8f6;
  --c-muted: #64748b;
  --c-dim:   #475569;

  --acc:    #3b82f6;
  --acc2:   #06b6d4;
  --green:  #10b981;
  --amber:  #f59e0b;
  --red:    #ef4444;
  --purple: #8b5cf6;

  --sb-w: 240px;
  --sb-col: 64px;
  --r:   10px;
  --r2:  14px;
  --r3:  18px;
  --fn:  'Inter', sans-serif;
  --fd:  'Syne', sans-serif;
  --fm:  'DM Mono', monospace;
  --ease: cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; background:var(--bg); color:var(--c-text); font-family:var(--fn); overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; font-family:var(--fn); }
input, select, textarea { font-family:var(--fn); }

/* ── SIDEBAR ── */
#sidebar {
  position:fixed; top:0; left:0; height:100vh; width:var(--sb-w);
  background:var(--bg1); border-right:1px solid var(--border);
  display:flex; flex-direction:column; z-index:200; overflow:hidden;
  transition:width .3s var(--ease);
}
.sb-brand {
  display:flex; align-items:center; gap:12px; padding:18px 14px;
  border-bottom:1px solid var(--border); min-height:68px; flex-shrink:0;
}
.sb-logo {
  width:34px; height:34px; border-radius:9px; flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff;
}
.sb-name { overflow:hidden; }
.sb-title { display:block; font-family:var(--fd); font-weight:700; font-size:15px; white-space:nowrap; }
.sb-version { display:block; font-size:10px; color:var(--c-muted); font-family:var(--fm); white-space:nowrap; margin-top:1px; }
#sbToggle {
  margin-left:auto; background:none; border:none; color:var(--c-muted);
  font-size:13px; padding:6px; border-radius:6px; flex-shrink:0;
}
#sbToggle:hover { background:var(--bg3); color:var(--c-text); }
.sb-org {
  padding:10px 16px; font-size:11px; font-weight:600; color:var(--acc2);
  letter-spacing:.5px; border-bottom:1px solid var(--border); white-space:nowrap;overflow:hidden;
}
.sb-nav { flex:1; overflow-y:auto; padding:8px 8px; scrollbar-width:none; }
.sb-nav::-webkit-scrollbar { display:none; }
.nav-label {
  font-size:9px; font-weight:700; letter-spacing:1.8px; color:var(--c-dim);
  padding:12px 8px 4px; white-space:nowrap; overflow:hidden;
}
.nav-link {
  display:flex; align-items:center; gap:10px; padding:9px 10px;
  border-radius:var(--r); color:var(--c-muted); font-size:13px; font-weight:500;
  transition:all .2s var(--ease); white-space:nowrap; overflow:hidden; position:relative;
  margin-bottom:1px;
}
.nav-link:hover { background:var(--bg3); color:var(--c-text); }
.nav-link.active { background:rgba(59,130,246,.12); color:var(--acc); border:1px solid rgba(59,130,246,.2); }
.nav-link i { width:18px; text-align:center; font-size:14px; flex-shrink:0; }
.nav-badge {
  margin-left:auto; font-size:9px; font-weight:700; padding:2px 7px;
  border-radius:20px; background:rgba(239,68,68,.15); color:var(--red); letter-spacing:.5px;
}
.nav-badge.pulse { animation:pulseTag 1.5s infinite; }
@keyframes pulseTag { 0%,100%{opacity:1}50%{opacity:.5} }
.sb-foot {
  padding:14px 16px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px; font-size:12px; color:var(--c-muted);
  white-space:nowrap; overflow:hidden;
}
.online-dot {
  width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0;
  box-shadow:0 0 8px var(--green); animation:blinkDot 2s infinite;
}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.4}}
/* collapsed */
#sidebar.collapsed { width:var(--sb-col); }
#sidebar.collapsed .sb-name,
#sidebar.collapsed .nav-label,
#sidebar.collapsed .nav-link span,
#sidebar.collapsed .nav-badge,
#sidebar.collapsed .sb-org,
#sidebar.collapsed .sb-foot span { opacity:0; pointer-events:none; width:0; overflow:hidden; }

/* ── MAIN ── */
#main { margin-left:var(--sb-w); padding:28px 28px 28px; min-height:100vh; transition:margin-left .3s var(--ease); }
#sidebar.collapsed ~ #main { margin-left:var(--sb-col); }

/* ── PAGE ── */
.pg { display:none; }
.pg.active { display:block; animation:fadeUp .25s var(--ease); }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.pg-head {
  display:flex; align-items:flex-start; justify-content:space-between;
  margin-bottom:24px; gap:16px; flex-wrap:wrap;
}
.pg-head h1 { font-family:var(--fd); font-size:28px; font-weight:700; }
.sub { font-size:13px; color:var(--c-muted); margin-top:3px; }
.head-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

/* ── CARDS ── */
.card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
  transition:border-color .2s;
}
.card:hover { border-color:var(--bord2); }
.card-head { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
.card-head h3 { font-family:var(--fd); font-size:15px; font-weight:600; }
.card-label { font-size:11px; font-weight:600; color:var(--c-muted); letter-spacing:.8px; }
.card-row { display:flex; justify-content:space-between; align-items:center; }

/* ── KPI CARDS ── */
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.kpi {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
  padding:18px 20px; display:flex; align-items:center; gap:14px;
  transition:all .2s; position:relative; overflow:hidden;
}
.kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--r2) var(--r2) 0 0; }
#kpiTotal::before   { background:var(--acc); }
#kpiPresent::before { background:var(--green); }
#kpiLate::before    { background:var(--amber); }
#kpiAbsent::before  { background:var(--red); }
.kpi:hover { transform:translateY(-2px); border-color:var(--bord2); }
.kpi-ico {
  width:44px; height:44px; border-radius:10px;
  display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
}
.kpi-ico.blue   { background:rgba(59,130,246,.12); color:var(--acc); }
.kpi-ico.green  { background:rgba(16,185,129,.12); color:var(--green); }
.kpi-ico.amber  { background:rgba(245,158,11,.12); color:var(--amber); }
.kpi-ico.red    { background:rgba(239,68,68,.12);  color:var(--red); }
.kpi-body { min-width:0; }
.kpi-body b { display:block; font-size:26px; font-weight:700; font-family:var(--fm); line-height:1; }
.kpi-body span { font-size:12px; color:var(--c-muted); }

/* Rate bar */
.rate-bar { height:6px; background:var(--bg4); border-radius:3px; overflow:hidden; }
.rate-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--acc),var(--green)); transition:width .8s var(--ease); }

/* Activity list */
.activity-list { padding:8px 0; }
.act-row {
  display:flex; align-items:center; gap:12px; padding:10px 20px;
  border-bottom:1px solid var(--border); transition:background .15s;
}
.act-row:last-child { border-bottom:none; }
.act-row:hover { background:var(--bg3); }
.act-av {
  width:36px; height:36px; border-radius:50%; background:var(--bg4); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; overflow:hidden;
}
.act-av img { width:100%; height:100%; object-fit:cover; }
.act-name { font-size:13px; font-weight:500; }
.act-dept { font-size:11px; color:var(--c-muted); }
.act-right { margin-left:auto; text-align:right; }
.act-time { font-size:12px; font-family:var(--fm); color:var(--c-muted); }

/* Pill */
.pill {
  background:rgba(59,130,246,.12); color:var(--acc);
  font-size:10px; font-weight:700; padding:2px 9px; border-radius:20px; font-family:var(--fm);
}
.badge-st {
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; display:inline-block;
}
.st-present { background:rgba(16,185,129,.1); color:var(--green); }
.st-late    { background:rgba(245,158,11,.1); color:var(--amber); }
.st-out     { background:rgba(59,130,246,.1); color:var(--acc); }
.st-absent  { background:rgba(239,68,68,.1);  color:var(--red); }

/* Shimmer */
.shimmer-row { height:52px; background:var(--bg3); border-radius:var(--r); margin:6px 20px; animation:shimmer 1.5s infinite linear; }
.shimmer-card { height:180px; background:var(--bg2); border-radius:var(--r2); border:1px solid var(--border); animation:shimmer 1.5s infinite linear; }
@keyframes shimmer { 0%{opacity:.6}50%{opacity:.3}100%{opacity:.6} }

/* ── LIVE TRACKING ── */
.live-layout { display:grid; grid-template-columns:1fr 340px; gap:16px; align-items:start; }
.map-container {
  position:relative; border-radius:var(--r2); overflow:hidden;
  border:1px solid var(--border); aspect-ratio:16/9; min-height:380px; background:#0a0f1e;
}
#liveMap { width:100%; height:100%; }
.map-overlay { position:absolute; top:12px; left:12px; z-index:500; pointer-events:none; }
.map-badge {
  background:rgba(8,11,20,.85); backdrop-filter:blur(8px);
  border:1px solid var(--bord2); border-radius:8px;
  padding:6px 12px; font-size:12px; font-weight:500; display:flex; align-items:center; gap:6px;
}
.map-controls {
  position:absolute; right:12px; top:12px; z-index:500;
  display:flex; flex-direction:column; gap:6px;
}
.map-btn {
  width:34px; height:34px; border-radius:8px;
  background:rgba(8,11,20,.85); backdrop-filter:blur(8px);
  border:1px solid var(--bord2); color:var(--c-text); font-size:13px;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.map-btn:hover { background:var(--bg3); border-color:var(--bord3); }
.live-side { display:flex; flex-direction:column; gap:12px; }
.live-card { padding:16px; }
.live-who { display:flex; align-items:center; gap:12px; }
.live-avatar {
  width:44px; height:44px; border-radius:50%; border:2px solid var(--bord2);
  display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--bg4); flex-shrink:0; overflow:hidden;
}
.live-avatar img { width:100%; height:100%; object-fit:cover; }
.live-avatar.active { border-color:var(--green); box-shadow:0 0 10px rgba(16,185,129,.3); }
.live-name { font-size:15px; font-weight:600; }
.live-dept { font-size:12px; color:var(--c-muted); }
.coord-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.coord-item { background:var(--bg3); border-radius:var(--r); padding:10px; }
.coord-lbl { display:block; font-size:10px; color:var(--c-muted); font-weight:600; letter-spacing:.5px; margin-bottom:4px; }
.coord-val { display:block; font-size:13px; font-family:var(--fm); font-weight:500; }
.coord-addr { font-size:12px; color:var(--c-muted); line-height:1.5; margin-bottom:8px; }
.maps-link {
  display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--acc);
  background:rgba(59,130,246,.08); padding:5px 10px; border-radius:6px; border:1px solid rgba(59,130,246,.2);
}
.info-rows { display:flex; flex-direction:column; gap:6px; }
.info-r { display:flex; justify-content:space-between; align-items:center; font-size:12px; }
.ir-lbl { color:var(--c-muted); }
.ir-val { font-family:var(--fm); font-size:11px; color:var(--c-text); text-align:right; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.trail-list { max-height:200px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; scrollbar-width:thin; }
.trail-row {
  font-size:11px; padding:6px 10px; background:var(--bg3);
  border-radius:6px; display:flex; gap:8px; align-items:center;
  border-left:2px solid var(--acc2);
}
.trail-row .tr-time { font-family:var(--fm); color:var(--acc2); flex-shrink:0; }
.trail-row .tr-addr { color:var(--c-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ── CLOCK PAGE ── */
.clock-layout { display:grid; grid-template-columns:1fr 310px; gap:20px; align-items:start; }
.cam-panel { display:flex; flex-direction:column; gap:14px; }
.cam-wrap {
  position:relative; border-radius:var(--r2); overflow:hidden;
  aspect-ratio:4/3; background:#000; border:1px solid var(--border);
}
.cam-wrap.small { aspect-ratio:1; max-width:280px; margin:0 auto; }
.cam-wrap video { width:100%; height:100%; object-fit:cover; display:block; }
.cam-wrap canvas { position:absolute; inset:0; width:100%; height:100%; }
.cam-ring-wrap {
  position:absolute; inset:0; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
}
.cam-ring {
  width:min(55%,180px); aspect-ratio:1; border-radius:50%;
  border:2px solid rgba(59,130,246,.5); position:relative;
  animation:ringPulse 2.5s infinite;
}
.cam-ring::before, .cam-ring::after {
  content:''; position:absolute; width:10px; height:10px;
  border-top:2px solid var(--acc); border-left:2px solid var(--acc);
  border-radius:2px 0 0 0;
}
.cam-ring::before { top:-2px; left:-2px; }
.cam-ring::after { bottom:-2px; right:-2px; transform:rotate(180deg); }
@keyframes ringPulse { 0%,100%{border-color:rgba(59,130,246,.5)}50%{border-color:rgba(6,182,212,.8)} }
.cam-scan {
  position:absolute; left:20%; right:20%; height:1px;
  background:linear-gradient(90deg,transparent,var(--acc2),transparent);
  animation:scanMove 3s ease-in-out infinite;
}
@keyframes scanMove { 0%{top:20%;opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{top:80%;opacity:0} }
.cam-hud { position:absolute; inset:0; pointer-events:none; font-size:11px; font-family:var(--fm); }
.hud-tl, .hud-tr, .hud-bl, .hud-br {
  position:absolute; padding:6px 10px;
  background:rgba(8,11,20,.7); border-radius:6px;
  backdrop-filter:blur(4px); color:var(--c-muted);
}
.hud-tl { top:10px; left:10px; color:var(--red); font-weight:700; letter-spacing:1px; font-size:10px; }
.hud-tr { top:10px; right:10px; }
.hud-bl { bottom:10px; left:10px; max-width:55%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hud-br { bottom:10px; right:10px; }
.cam-msg {
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(8,11,20,.75); font-size:13px; color:var(--c-muted); gap:8px;
}
.cam-msg i { font-size:28px; }
.cam-controls { display:flex; gap:10px; }
.cc-btn {
  flex:1; padding:11px; border-radius:var(--r); background:var(--bg3);
  border:1px solid var(--bord2); color:var(--c-text); font-size:13px; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:7px;
  transition:all .2s;
}
.cc-btn:hover:not(:disabled) { background:var(--bg4); border-color:var(--bord3); }
.cc-btn:disabled { opacity:.35; cursor:not-allowed; }
.cc-btn.primary { border-color:rgba(59,130,246,.4); background:rgba(59,130,246,.08); color:var(--acc); }
.cc-btn.primary:hover:not(:disabled) { background:rgba(59,130,246,.15); }

/* Verify box */
.verify-box {
  background:var(--bg2); border:1px solid var(--bord2); border-radius:var(--r2); padding:18px;
}
.verify-box.hidden { display:none; }
.verify-box.ok { border-color:rgba(16,185,129,.4); }
.verify-box.fail { border-color:rgba(239,68,68,.4); }
.verify-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.vfy-avatar {
  width:60px; height:60px; border-radius:50%; background:var(--bg4);
  display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700;
  color:var(--acc); border:2px solid var(--bord2); flex-shrink:0; overflow:hidden;
}
.vfy-avatar img { width:100%; height:100%; object-fit:cover; }
.vfy-name { font-size:17px; font-weight:600; }
.vfy-sub  { font-size:12px; color:var(--c-muted); margin-top:2px; }
.vfy-score { font-size:12px; font-family:var(--fm); color:var(--green); margin-top:4px; }
.verify-btns { display:flex; gap:10px; }
.btn-timein, .btn-timeout {
  flex:1; padding:12px; border-radius:var(--r); border:none; font-family:var(--fn); font-size:13px; font-weight:600;
  display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s;
}
.btn-timein  { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.25); }
.btn-timein:hover  { background:rgba(16,185,129,.2); }
.btn-timeout { background:rgba(59,130,246,.12); color:var(--acc); border:1px solid rgba(59,130,246,.25); }
.btn-timeout:hover { background:rgba(59,130,246,.2); }
.vfy-error {
  margin-top:10px; padding:9px 12px; border-radius:var(--r); font-size:12px;
  background:rgba(239,68,68,.08); color:var(--red); border:1px solid rgba(239,68,68,.2);
  display:flex; align-items:center; gap:6px;
}
.vfy-error.hidden { display:none; }

/* Status panel */
.status-panel { display:flex; flex-direction:column; gap:12px; }
.clock-display {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
  padding:20px; text-align:center;
}
#bigClock { font-size:36px; font-weight:700; font-family:var(--fm); color:var(--acc); letter-spacing:3px; }
#bigDate  { font-size:12px; color:var(--c-muted); margin-top:4px; }
.sp-card { padding:14px 16px; }
.sp-card-head { font-size:11px; font-weight:600; color:var(--c-muted); letter-spacing:.8px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.sp-val { font-size:14px; font-weight:500; }
.sp-mono { font-size:11px; font-family:var(--fm); color:var(--c-muted); margin-top:3px; }
.sp-addr { font-size:11px; color:var(--c-muted); margin-top:4px; line-height:1.4; }
.blink-text { animation:blinkT 1.5s infinite; }
@keyframes blinkT { 0%,100%{opacity:1}50%{opacity:.5} }
.gf-badge { font-size:11px; font-weight:600; padding:4px 12px; border-radius:20px; display:inline-block; margin-top:8px; }
.gf-inside  { background:rgba(16,185,129,.1); color:var(--green); border:1px solid rgba(16,185,129,.2); }
.gf-outside { background:rgba(239,68,68,.1);  color:var(--red);   border:1px solid rgba(239,68,68,.2); }
.acc-bar { display:flex; align-items:center; gap:8px; margin-top:8px; font-size:11px; }
.acc-label { color:var(--c-muted); flex-shrink:0; }
.acc-track { flex:1; height:4px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.acc-fill { height:100%; border-radius:2px; background:var(--green); transition:width .5s; }
.acc-meters { font-family:var(--fm); color:var(--c-muted); flex-shrink:0; }

/* ── RECORDS ── */
.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.fin {
  background:var(--bg2); border:1px solid var(--bord2); border-radius:var(--r);
  padding:9px 12px; color:var(--c-text); font-size:13px; flex:1; min-width:130px;
}
.fin:focus { outline:none; border-color:var(--acc); }
.fin option { background:var(--bg2); }
.tbl-wrap { overflow-x:auto; border-radius:var(--r2); border:1px solid var(--border); }
.dtbl { width:100%; border-collapse:collapse; font-size:12px; }
.dtbl th {
  background:var(--bg3); padding:11px 13px; text-align:left;
  font-size:10px; font-weight:600; color:var(--c-muted); text-transform:uppercase;
  letter-spacing:.6px; border-bottom:1px solid var(--border); white-space:nowrap;
}
.dtbl td { padding:11px 13px; border-bottom:1px solid var(--border); vertical-align:middle; }
.dtbl tbody tr:hover { background:var(--bg3); }
.dtbl tbody tr:last-child td { border-bottom:none; }
.empty-cell { text-align:center; color:var(--c-muted); padding:32px!important; font-size:13px; }
.mono-sm { font-family:var(--fm); font-size:11px; }

/* ── REGISTER ── */
.reg-layout { display:grid; grid-template-columns:280px 1fr; gap:24px; align-items:start; }
.reg-cam-col { display:flex; flex-direction:column; gap:12px; }
.reg-preview { border-radius:var(--r2); overflow:hidden; position:relative; }
.reg-preview img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.reg-prev-badge {
  position:absolute; bottom:0; left:0; right:0; background:rgba(16,185,129,.85);
  backdrop-filter:blur(4px); color:#fff; text-align:center; padding:9px;
  font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px;
}
.reg-form-col { }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; margin-bottom:18px; }
.fg { display:flex; flex-direction:column; gap:5px; }
.fg label { font-size:11px; font-weight:600; color:var(--c-muted); text-transform:uppercase; letter-spacing:.4px; }
.fg input, .fg select {
  background:var(--bg3); border:1px solid var(--bord2); border-radius:var(--r);
  padding:10px 12px; color:var(--c-text); font-size:13px; transition:border-color .2s;
}
.fg input:focus, .fg select:focus { outline:none; border-color:var(--acc); }
.fg select option { background:var(--bg3); }
.req { color:var(--red); }
.reg-msg { padding:11px 14px; border-radius:var(--r); font-size:13px; margin-bottom:12px; }
.reg-msg.success { background:rgba(16,185,129,.08); color:var(--green); border:1px solid rgba(16,185,129,.2); }
.reg-msg.error   { background:rgba(239,68,68,.08);  color:var(--red);   border:1px solid rgba(239,68,68,.2); }
.btn-register {
  width:100%; padding:13px; border-radius:var(--r); border:none;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  color:#fff; font-family:var(--fd); font-size:15px; font-weight:600;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all .2s;
}
.btn-register:hover:not(:disabled) { opacity:.9; transform:translateY(-1px); }
.btn-register:disabled { opacity:.3; cursor:not-allowed; transform:none; }
.face-quality { margin-top:8px; display:flex; align-items:center; gap:10px; font-size:11px; }
.fq-bar { flex:1; height:4px; background:var(--bg4); border-radius:2px; overflow:hidden; }
.fq-bar div { height:100%; border-radius:2px; transition:all .3s; }
#fqLabel { color:var(--c-muted); }

/* ── EMPLOYEES ── */
.emp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
.emp-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2);
  padding:18px; text-align:center; transition:all .2s;
}
.emp-card:hover { transform:translateY(-2px); border-color:var(--bord2); }
.emp-av {
  width:56px; height:56px; border-radius:50%; background:var(--bg4);
  margin:0 auto 10px; display:flex; align-items:center; justify-content:center;
  font-size:20px; font-weight:700; color:var(--acc); overflow:hidden;
  border:2px solid rgba(59,130,246,.2);
}
.emp-av img { width:100%; height:100%; object-fit:cover; }
.emp-n  { font-size:14px; font-weight:600; margin-bottom:2px; }
.emp-d  { font-size:11px; color:var(--c-muted); }
.emp-id { font-size:10px; font-family:var(--fm); color:var(--acc); margin-top:4px; }
.emp-acts { display:flex; gap:6px; margin-top:12px; justify-content:center; }
.emp-act {
  padding:5px 10px; border-radius:6px; border:1px solid var(--bord2);
  background:transparent; color:var(--c-muted); font-size:11px; transition:all .2s;
}
.emp-act:hover { background:var(--bg3); color:var(--c-text); }
.emp-act.del:hover { border-color:var(--red); color:var(--red); }

/* ── SETTINGS ── */
.settings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
.settings-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r2); padding:20px; }
.settings-card.full { grid-column:1/-1; }
.settings-card h4 { font-family:var(--fd); font-size:14px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:7px; color:var(--acc2); }
.toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; font-size:13px; }
.tog { position:relative; display:inline-block; width:42px; height:22px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; }
.tog-sl { position:absolute; inset:0; background:var(--bg4); border-radius:11px; cursor:pointer; transition:.2s; border:1px solid var(--bord2); }
.tog-sl::before { content:''; position:absolute; width:16px; height:16px; bottom:2px; left:2px; background:#fff; border-radius:50%; transition:.2s; }
.tog input:checked + .tog-sl { background:var(--acc); border-color:var(--acc); }
.tog input:checked + .tog-sl::before { transform:translateX(20px); }
.range-val { font-family:var(--fm); font-size:12px; color:var(--acc); min-width:36px; }

/* ── BUTTONS ── */
.btn-primary {
  padding:9px 16px; border-radius:var(--r); border:none;
  background:rgba(59,130,246,.12); color:var(--acc); border:1px solid rgba(59,130,246,.25);
  font-family:var(--fn); font-size:13px; font-weight:500;
  display:inline-flex; align-items:center; gap:6px; transition:all .2s;
}
.btn-primary:hover { background:rgba(59,130,246,.2); }
.btn-secondary {
  padding:9px 14px; border-radius:var(--r);
  background:var(--bg3); border:1px solid var(--bord2);
  color:var(--c-text); font-family:var(--fn); font-size:13px; font-weight:500;
  display:inline-flex; align-items:center; gap:6px; transition:all .2s;
}
.btn-secondary:hover { background:var(--bg4); }
.btn-secondary.sm { padding:7px 12px; font-size:12px; }
.btn-danger {
  padding:9px 16px; border-radius:var(--r);
  background:rgba(239,68,68,.1); color:var(--red); border:1px solid rgba(239,68,68,.2);
  font-family:var(--fn); font-size:13px; font-weight:500;
  display:inline-flex; align-items:center; gap:6px; transition:all .2s;
}
.btn-danger:hover { background:rgba(239,68,68,.2); }
.btn-ghost {
  padding:8px 14px; border-radius:var(--r);
  background:transparent; border:1px solid var(--bord2); color:var(--c-muted);
  font-size:13px; font-weight:500; display:inline-flex; align-items:center; gap:6px; transition:all .2s;
}
.btn-ghost:hover { background:var(--bg3); color:var(--c-text); }
.sel-input {
  background:var(--bg3); border:1px solid var(--bord2); border-radius:var(--r);
  padding:8px 12px; color:var(--c-text); font-size:13px;
}
.sel-input:focus { outline:none; border-color:var(--acc); }
.sel-input option { background:var(--bg3); }

/* ── LOADING ── */
.load-overlay {
  position:fixed; inset:0; background:rgba(8,11,20,.8); backdrop-filter:blur(6px);
  z-index:9000; display:flex; align-items:center; justify-content:center;
}
.load-overlay.hidden { display:none; }
.load-box {
  background:var(--bg2); border:1px solid var(--bord2); border-radius:var(--r2);
  padding:28px 36px; display:flex; flex-direction:column; align-items:center; gap:14px; font-size:14px; color:var(--c-muted);
}
.load-spinner {
  width:40px; height:40px; border-radius:50%;
  border:3px solid var(--bg4); border-top-color:var(--acc);
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── TOASTS ── */
.toast-stack { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:7px; }
.toast {
  background:var(--bg3); border:1px solid var(--bord2); border-radius:10px;
  padding:11px 16px; font-size:13px; display:flex; align-items:center; gap:10px;
  min-width:220px; max-width:340px; box-shadow:0 8px 28px rgba(0,0,0,.5);
  animation:toastIn .25s var(--ease);
}
@keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
.toast.ok  { border-left:3px solid var(--green); }
.toast.err { border-left:3px solid var(--red); }
.toast.warn{ border-left:3px solid var(--amber); }
.toast.info{ border-left:3px solid var(--acc); }

/* ── MOBILE NAV ── */
.mob-nav {
  display:none; position:fixed; bottom:0; left:0; right:0;
  background:var(--bg1); border-top:1px solid var(--border);
  padding:7px 0 calc(7px + env(safe-area-inset-bottom));
  grid-template-columns:repeat(5,1fr); z-index:200;
}
.mn-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:5px; color:var(--c-muted); font-size:10px; font-weight:500; cursor:pointer;
  transition:color .2s;
}
.mn-item i { font-size:18px; }
.mn-item.active { color:var(--acc); }

/* Leaflet overrides */
.leaflet-container { background:#0d1120; }
.leaflet-tile { filter:brightness(.85) saturate(.8) hue-rotate(200deg); }

/* ── RESPONSIVE ── */
@media(max-width:1100px) {
  .kpi-row { grid-template-columns:1fr 1fr; }
  .live-layout { grid-template-columns:1fr; }
  .map-container { aspect-ratio:16/9; min-height:300px; }
}
@media(max-width:900px) {
  .clock-layout { grid-template-columns:1fr; }
  .status-panel { display:grid; grid-template-columns:1fr 1fr; }
  .reg-layout { grid-template-columns:1fr; }
  .form-grid { grid-template-columns:1fr; }
}
@media(max-width:720px) {
  #sidebar { display:none; }
  #main { margin-left:0!important; padding:14px 12px 76px; }
  .mob-nav { display:grid; }
  .kpi-row { grid-template-columns:1fr 1fr; }
  .pg-head h1 { font-size:22px; }
  .emp-grid { grid-template-columns:1fr 1fr; }
  .status-panel { display:flex; flex-direction:column; }
}
</style>
</head>
<body>
<!-- CAMERA PAGE ONLY -->
<main id="main" style="margin-left:0;padding:20px">
  <div class="pg-head">
    <div><h1>Clock In / Out</h1><p class="sub">Facial capture + location verification</p></div>
  </div>
  <div class="clock-layout">
    <div class="cam-panel">
      <div class="cam-wrap" id="camWrap">
        <video id="vidFeed" autoplay muted playsinline></video>
        <canvas id="camCanvas"></canvas>
        <div class="cam-ring-wrap">
          <div class="cam-ring" id="camRing"></div>
          <div class="cam-scan" id="camScan"></div>
        </div>
        <div class="cam-hud">
          <div class="hud-tl">LIVE</div>
          <div class="hud-tr" id="hudTime">00:00:00</div>
          <div class="hud-bl" id="hudGPS"><i class="fa-solid fa-location-dot"></i> —</div>
          <div class="hud-br" id="hudNet"><i class="fa-solid fa-wifi"></i> —</div>
        </div>
        <div class="cam-msg" id="camMsg"><i class="fa-solid fa-camera-slash"></i> Camera not started</div>
      </div>
      <div id="verifyBox" class="verify-box hidden">
        <div class="verify-top">
          <div class="vfy-avatar" id="vfyAva"></div>
          <div class="vfy-info">
            <div class="vfy-name" id="vfyName">—</div>
            <div class="vfy-sub" id="vfySub">—</div>
            <div class="vfy-score" id="vfyScore"></div>
          </div>
        </div>
        <div class="verify-btns">
          <button class="btn-timein" id="btnIn" onclick="doRecord('time_in')"><i class="fa-solid fa-arrow-right-to-bracket"></i> TIME IN</button>
          <button class="btn-timeout" id="btnOut" onclick="doRecord('time_out')"><i class="fa-solid fa-arrow-right-from-bracket"></i> TIME OUT</button>
        </div>
        <div id="vfyError" class="vfy-error hidden"><i class="fa-solid fa-triangle-exclamation"></i> <span></span></div>
      </div>
      <div class="cam-controls">
        <button class="cc-btn" id="btnStartCam" onclick="startClockCam()"><i class="fa-solid fa-camera"></i> Start Camera</button>
        <button class="cc-btn primary" id="btnVerify" onclick="captureVerify()" disabled><i class="fa-solid fa-bolt"></i> Verify Face</button>
      </div>
    </div>
    <div class="status-panel">
      <div class="clock-display"><div id="bigClock">00:00:00</div><div id="bigDate">—</div></div>
      <div class="card sp-card" id="gpsCard">
        <div class="sp-card-head"><i class="fa-solid fa-location-dot"></i> GPS Status</div>
        <div id="gpsStatusText" class="sp-val blink-text">Waiting for signal...</div>
        <div id="gpsCoords" class="sp-mono">—</div>
        <div id="gpsAddr" class="sp-addr">—</div>
        <div id="gfBadge" class="gf-badge hidden"></div>
        <div id="gpsAccBar" class="acc-bar hidden">
          <span class="acc-label">Accuracy</span>
          <div class="acc-track"><div id="accFill" class="acc-fill"></div></div>
          <span id="accMeters" class="acc-meters">—</span>
        </div>
      </div>
      <div class="card sp-card">
        <div class="sp-card-head"><i class="fa-solid fa-network-wired"></i> Network</div>
        <div id="netType" class="sp-val">Detecting...</div>
        <div class="info-rows" style="margin-top:10px">
          <div class="info-r"><span class="ir-lbl">IP Address</span><span class="ir-val" id="clockIP">—</span></div>
        </div>
      </div>
      <div class="card sp-card">
        <div class="sp-card-head"><i class="fa-solid fa-mobile-screen"></i> Device</div>
        <div class="info-rows">
          <div class="info-r"><span class="ir-lbl">Platform</span><span class="ir-val" id="devPlatform">—</span></div>
          <div class="info-r"><span class="ir-lbl">Screen</span><span class="ir-val" id="devScreen">—</span></div>
        </div>
      </div>
    </div>
  </div>
</main>
<div id="loadOverlay" class="load-overlay hidden">
  <div class="load-box"><div class="load-spinner"></div><span id="loadMsg">Processing...</span></div>
</div>
<div id="toasts" class="toast-stack"></div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbyiZmEIfZz2PuMkODo_GemKvf_zcQBrfCsK7ESw659xmwxBhjCA-h-tJhwBBLwE43U3/exec';

var A = {
  config:{}, employees:[], camStream:null, modelsReady:false,
  verified:null, capturedPic:null, gps:null, gpsWatchId:null,
  ip:'', netInfo:'', device:''
};

function el(id){ return document.getElementById(id); }
function setText(id,v){ var e=el(id); if(e) e.textContent=v; }

// Clock
function startClock() {
  function tick() {
    var now = new Date();
    var pad = function(n){ return String(n).padStart(2,'0'); };
    var t = pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
    var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var d = days[now.getDay()]+', '+months[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
    el('bigClock').textContent=t; el('bigDate').textContent=d; el('hudTime').textContent=t;
  }
  tick(); setInterval(tick,1000);
}

// GAS API calls via fetch
function gasCall(func, params) {
  var url = GAS_URL + '?action=' + func + '&data=' + encodeURIComponent(JSON.stringify(params||{}));
  return fetch(url).then(function(r){ return r.json(); });
}

function gasPost(func, params) {
  return fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'action='+func+'&data='+encodeURIComponent(JSON.stringify(params||{}))
  }).then(function(r){ return r.json(); });
}

// Load config and employees from GAS
function loadAll() {
  return fetch(GAS_URL + '?action=getConfig')
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      A.config = cfg || {};
      return fetch(GAS_URL + '?action=getEmployees');
    })
    .then(function(r){ return r.json(); })
    .then(function(emps){ A.employees = emps || []; });
}

// Face models
function loadFaceModels() {
  var URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
  toast('Loading face models...','info');
  return Promise.all([
    faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(URL),
    faceapi.nets.faceRecognitionNet.loadFromUri(URL)
  ]).then(function(){ A.modelsReady=true; toast('Face models ready','ok'); })
    .catch(function(){ toast('Face model load failed','err'); });
}

// GPS
function startGPS() {
  if (!navigator.geolocation) return;
  A.gpsWatchId = navigator.geolocation.watchPosition(function(pos){
    var c = pos.coords;
    A.gps = {lat:c.latitude, lng:c.longitude, accuracy:c.accuracy, speed:c.speed};
    setText('gpsStatusText','Signal acquired');
    el('gpsStatusText').classList.remove('blink-text');
    setText('gpsCoords', c.latitude.toFixed(6)+', '+c.longitude.toFixed(6));
    el('gpsAccBar').classList.remove('hidden');
    var pct = Math.max(0,Math.min(100,100-(c.accuracy/50)*100));
    el('accFill').style.width=pct+'%';
    setText('accMeters', Math.round(c.accuracy)+'m');
    el('hudGPS').innerHTML='<i class="fa-solid fa-location-dot"></i> '+c.latitude.toFixed(4)+', '+c.longitude.toFixed(4);
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+c.latitude+'&lon='+c.longitude+'&format=json')
      .then(function(r){return r.json();})
      .then(function(d){ if(d.display_name){ A.gps.address=d.display_name.split(',').slice(0,3).join(', '); setText('gpsAddr',A.gps.address); }})
      .catch(function(){});
  }, function(e){ console.warn(e); }, {enableHighAccuracy:true,maximumAge:3000,timeout:10000});
}

// Network
function detectNetwork() {
  var conn = navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if (conn) {
    var type = (conn.effectiveType||conn.type||'').toUpperCase();
    A.netInfo = type; setText('netType', type||'Unknown');
    el('hudNet').innerHTML='<i class="fa-solid fa-wifi"></i> '+(type||'Net');
  }
  fetch('https://api.ipify.org?format=json')
    .then(function(r){return r.json();})
    .then(function(d){ A.ip=d.ip||''; setText('clockIP',A.ip); })
    .catch(function(){});
  var ua=navigator.userAgent;
  var dev='Desktop';
  if(/iPhone/.test(ua)) dev='iPhone';
  else if(/Android/.test(ua)) dev='Android';
  A.device=dev;
  setText('devPlatform',dev);
  setText('devScreen',screen.width+'x'+screen.height);
}

// Camera
function startClockCam() {
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false})
    .then(function(stream){
      A.camStream=stream;
      el('vidFeed').srcObject=stream;
      el('btnVerify').disabled=false;
      el('camMsg').style.display='none';
      toast('Camera started','ok');
    })
    .catch(function(e){ toast('Camera error: '+e.message,'err'); });
}

function captureVerify() {
  if (!A.modelsReady){ toast('Models loading...','warn'); return; }
  if (!A.camStream){ toast('Start camera first','warn'); return; }
  loading(true,'Verifying face...');
  var vid=el('vidFeed');
  faceapi.detectSingleFace(vid, new faceapi.SsdMobilenetv1Options({minConfidence:0.5}))
    .withFaceLandmarks().withFaceDescriptor()
    .then(function(det){
      if (!det){ loading(false); toast('No face detected','warn'); return; }
      var cvs=document.createElement('canvas');
      cvs.width=vid.videoWidth; cvs.height=vid.videoHeight;
      cvs.getContext('2d').drawImage(vid,0,0);
      A.capturedPic=cvs.toDataURL('image/jpeg',0.75);
      var thresh=+(A.config.FACE_THRESHOLD||0.55);
      var best=null, bestD=Infinity;
      A.employees.forEach(function(emp){
        if (!emp.faceDescriptor) return;
        var arr=Array.isArray(emp.faceDescriptor)?emp.faceDescriptor:Object.values(emp.faceDescriptor);
        var d=faceapi.euclideanDistance(det.descriptor, new Float32Array(arr));
        if (d<bestD){ bestD=d; best=emp; }
      });
      loading(false);
      if (best && bestD<thresh){ A.verified=best; showVerify(best,Math.round((1-bestD)*100),true); }
      else { A.verified=null; showVerify(null,null,false); }
    })
    .catch(function(e){ loading(false); toast('Error: '+e.message,'err'); });
}

function showVerify(emp,score,ok){
  var box=el('verifyBox');
  box.classList.remove('hidden','ok','fail');
  box.classList.add(ok?'ok':'fail');
  el('vfyError').classList.add('hidden');
  if (ok&&emp){
    el('vfyAva').innerHTML=emp.photoUrl?'<img src="'+emp.photoUrl+'" alt="">':emp.fullName.split(' ').map(function(n){return n[0];}).join('').substring(0,2).toUpperCase();
    setText('vfyName',emp.fullName);
    setText('vfySub',emp.department+' · '+(emp.position||'Staff')+' · '+emp.employeeId);
    setText('vfyScore','Face Match: '+score+'%');
    el('btnIn').style.display=''; el('btnOut').style.display='';
  } else {
    el('vfyAva').innerHTML='<i class="fa-solid fa-user-slash"></i>';
    setText('vfyName','Not Recognized');
    setText('vfySub','Face does not match any registered employee');
    setText('vfyScore','');
    el('btnIn').style.display='none'; el('btnOut').style.display='none';
    el('vfyError').classList.remove('hidden');
    el('vfyError').querySelector('span').textContent='Employee not registered or face not clear enough.';
  }
}

function doRecord(type){
  if (!A.verified){ toast('No verified employee','err'); return; }
  loading(true, type==='time_in'?'Recording Time In...':'Recording Time Out...');
  function finalize(photoUrl){
    var rec={
      employeeId:A.verified.employeeId, fullName:A.verified.fullName,
      department:A.verified.department, position:A.verified.position||'', type:type,
      latitude:A.gps?A.gps.lat:'', longitude:A.gps?A.gps.lng:'',
      accuracy:A.gps?A.gps.accuracy:'', address:A.gps?(A.gps.address||')':'',
      ipAddress:A.ip, networkType:A.netInfo,
      userAgent:navigator.userAgent.substring(0,200), device:A.device,
      faceScore:el('vfyScore')?el('vfyScore').textContent:'',
      faceVerified:true, photoUrl:photoUrl, remarks:''
    };
    fetch(GAS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'logAttendance', data:rec})
    }).then(function(){
      loading(false);
      toast((type==='time_in'?'Time In':'Time Out')+' recorded!','ok');
      el('verifyBox').classList.add('hidden');
      A.verified=null; A.capturedPic=null;
    }).catch(function(e){ loading(false); toast('Error: '+e.message,'err'); });
  }
  if (A.capturedPic){
    fetch(GAS_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'uploadPhoto', b64:A.capturedPic, fileName:A.verified.employeeId+'_'+Date.now()+'.jpg'})
    }).then(function(){ finalize(''); }).catch(function(){ finalize(''); });
  } else { finalize(''); }
}

function loading(show,msg){ el('loadOverlay').classList.toggle('hidden',!show); if(msg) setText('loadMsg',msg); }
function toast(msg,type){
  type=type||'info';
  var icons={ok:'circle-check',err:'circle-xmark',warn:'triangle-exclamation',info:'circle-info'};
  var t=document.createElement('div');
  t.className='toast '+type;
  t.innerHTML='<i class="fa-solid fa-'+(icons[type]||'circle-info')+'"></i><span>'+msg+'</span>';
  el('toasts').appendChild(t);
  setTimeout(function(){ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(function(){t.remove();},400); },4000);
}

// Boot
window.addEventListener('load', function(){
  startClock();
  detectNetwork();
  startGPS();
  loadFaceModels();
  loadAll().then(function(){ toast('Ready — '+A.employees.length+' employees loaded','ok'); });
});
</script>
